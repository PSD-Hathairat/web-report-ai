<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pre vs Post Buttons</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0f4ff, #e0eaff);
            min-height: 100vh;
        }

        .type-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.25rem;
        }

        .type-card {
            --card-color: #4a6cf7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
            width: 190px;
            padding: 1.5rem 1.25rem;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.12), 0 1px 3px rgba(0, 0, 0, 0.06);
        }

        .type-card .icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            color: #fff;
            background: var(--card-color);
        }

        .type-card .type-title {
            font-weight: 700;
            font-size: 1rem;
            color: #1f2544;
        }

        .type-card .type-sub {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: -0.6rem;
        }

        .agent-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.55rem 0.75rem;
            border-radius: 10px;
            border: 1px solid #e5e7f0;
            background: #f8f9fd;
            color: #1f2544;
            font-weight: 600;
            font-size: 0.8rem;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .agent-btn i {
            font-size: 0.95rem;
            color: var(--card-color);
        }

        .agent-btn .agent-label {
            display: flex;
            flex-direction: column;
            line-height: 1.15;
        }

        .agent-btn .agent-sub {
            font-size: 0.65rem;
            font-weight: 400;
            color: #9198a8;
        }

        .agent-btn:hover {
            transform: translateY(-2px);
            border-color: var(--card-color);
            background: #ffffff;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            color: #1f2544;
        }

        .type-prefix {
            --card-color: #4a6cf7;
        }

        .type-postfix {
            --card-color: #2fb380;
        }

        .type-compare {
            --card-color: #f5a524;
        }

        .type-other {
            --card-color: #8b5cf6;
        }

        .btn-howto-small {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #6b7280;
            text-decoration: none;
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            border: 1px solid #d8dce8;
            background: rgba(255, 255, 255, 0.6);
            transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .btn-howto-small:hover {
            color: #8b5cf6;
            border-color: #8b5cf6;
            background: #ffffff;
        }
    </style>
</head>

<body>
    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 py-5">

        <div class="type-grid">

            <!-- Pre Fix -->
            <div class="type-card type-prefix">
                <span class="icon-wrap"><i class="bi bi-file-earmark-diff"></i></span>
                <span class="type-title">Pre Fix</span>
                <span class="type-sub">Before changes</span>

                <a href="prefix-stream.drawio.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span class="agent-label">Default Agent<span class="agent-sub">API Stream</span></span>
                </a>
                <a href="prefix-chat.drawio.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-people-fill"></i>
                    <span class="agent-label">Multi Agent<span class="agent-sub">API Chat</span></span>
                </a>
            </div>

            <!-- Post Fix -->
            <div class="type-card type-postfix">
                <span class="icon-wrap"><i class="bi bi-check2-circle"></i></span>
                <span class="type-title">Post Fix</span>
                <span class="type-sub">After changes</span>

                <a href="postfix-default.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span class="agent-label">Default Agent<span class="agent-sub">API Stream</span></span>
                </a>
                <a href="postfix-multiagent.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-people-fill"></i>
                    <span class="agent-label">Multi Agent<span class="agent-sub">API Chat</span></span>
                </a>
            </div>

            <!-- Pre vs Post -->
            <div class="type-card type-compare">
                <span class="icon-wrap"><i class="bi bi-arrow-left-right"></i></span>
                <span class="type-title">Pre vs Post</span>
                <span class="type-sub">Compare both</span>

                <a href="compare-default.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span class="agent-label">Default Agent<span class="agent-sub">API Stream</span></span>
                </a>
                <a href="compare-multiagent.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-people-fill"></i>
                    <span class="agent-label">Multi Agent<span class="agent-sub">API Chat</span></span>
                </a>
            </div>

            <!-- Other -->
            <div class="type-card type-other">
                <span class="icon-wrap"><i class="bi bi-three-dots"></i></span>
                <span class="type-title">Other</span>
                <span class="type-sub">Everything else</span>

                <a href="FINAL_lookup_track_notes.drawio.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span class="agent-label">Pre Fix<span class="agent-sub">API Stream , Chat</span></span>
                </a>
                <a href="other-multiagent.html" class="agent-btn" target="_blank" rel="noopener noreferrer">
                    <i class="bi bi-people-fill"></i>
                    <span class="agent-label">Post Fix<span class="agent-sub">API Stream , Chat</span></span>
                </a>
            </div>

        </div>

        <div class="text-center mt-4">
            <a href="howto.drawio.html" class="btn-howto-small" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-signpost-2"></i> Testing guide
            </a>
        </div>
    </div>
    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
